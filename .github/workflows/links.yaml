---
name: Links

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  links:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 2
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/links@95df55339346244d6434eda9edfc05d53aa6c9cc # v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
