---
name: Links

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  links:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 2
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/links@dca9a13d483fe335f0b9edbd08494e6e4cd3b498 # v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
